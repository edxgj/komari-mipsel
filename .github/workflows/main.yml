name: Build Komari Agent MIPSLE
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clone Official Repo
      uses: actions/checkout@v4
      with:
        repository: 'komari-monitor/komari-agent'
        fetch-depth: 0
        
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        
    - name: Compile for MIPSLE (mipsel_24kc)
      run: |
        VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "custom-build")
        echo "Building version: $VERSION"
        CGO_ENABLED=0 GOOS=linux GOARCH=mipsle GOMIPS=softfloat go build -trimpath -ldflags="-s -w -X 'main.version=${VERSION}'" -o komari-agent-mipsle
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: komari-agent-mipsle
        path: komari-agent-mipsle
